<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대원전기 SAFETY CRM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.12/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 1153줄짜리 대원전기 SAFETY CRM 소스코드를 읽어옵니다.
        fetch('./daewon-safety-crm.jsx')
            .then(res => res.text())
            .then(code => {
                // 외부 라이브러리 import 문법 강제 제거 (오류 방지)
                const cleanCode = code.replace(/import\s+[\s\S]*?from\s+['"].*?['"];?/g, '');
                
                // 바벨을 통해 브라우저용 코드로 변환 후 실행
                const transformed = Babel.transform(cleanCode, { presets: ['react'] }).code;
                const scriptEl = document.createElement('script');
                scriptEl.text = transformed;
                document.body.appendChild(scriptEl);
                
                setTimeout(() => {
                    // ★ 확인된 진짜 메인 이름인 SafetyManagementCRM을 다이렉트로 완벽하게 구동합니다!
                    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SafetyManagementCRM));
                }, 100);
            })
            .catch(err => {
                document.getElementById('root').innerHTML = "<div style='padding:20px; color:red;'>파일 로드 실패</div>";
            });
    </script>
</body>
</html>
